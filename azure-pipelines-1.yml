# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: ubuntu-latest

variables:
    buildConfiguration: 'Release'

stages:

#------------- Build stage -----------

  - stage: Build
    displayName: Build Application 

    jobs:
      - job: BuildJob

        steps:
        
        # Install SDK
        - task: UseDotNet@2
          displayName: Install SDK
          inputs:
            packageType: sdk
            version: 9.0.x

        # install NuGet
        - task: DotNetCoreCLI@2
          displayName: Rstore
          inputs:
           command : restore
           projects: '**/*.csproj'

        # Building Solution
        - task : DotNetCoreCLI@2
          displayName: Build Solution
          inputs:
            command : build
            projects: '**/*.csproj'
            arguments: '--configuration $(buildConfiguration) --no-restore'

        # running Test
        - task: DotNetCoreCLI@2
          displayName: Run Test
          inputs:
            command: test
            projects: '**/*Tests.csproj'
            arguments: '--configuration $(buildConfiguration) --no-build'
            publishTestResults: true

        # Publishing Web API
        - task: DotNetCoreCLI@2
          displayName: Publish Web Api
          inputs:
            command: publish
            publishWebProjects: false
            projects: '**/DemoLogicAppApi.csproj'
            #arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
            arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/webapp'
            zipAfterPublish: true   
        
        # Publishing Artifact
        - task: PublishBuildArtifacts@1
          displayName: Publish Artifact 
          inputs:
            PathtoPublish: '$(Build.ArtifactStagingDirectory)'
            ArtifactName: 'drop'
            publishLocation: Container
               

# QA DEPLOYMENT
  - stage: QA_Deployment
    displayName: Deplyeing to QA
    dependsOn: Build

    jobs:
      - deployment: QA_Deployement
        environment: QA

        strategy:
         runOnce:
           deploy:
             steps:
               - download: current
                 artifact: drop
               - task: AzureWebApp@1
                 inputs:
                   azureSubscription: 'WP_Subscription_0185(df43b0ba-309f-4017-b532-1eb014fce3c8)'
                   appType : webApp
                   appName: 'MyAzureDevOps'

                   deployToSlotOrASE: true
                  #  resourceGroupName: 'WP_SL_User_177'
                   resourceGroupName: 'VisualStudioOnline-C4E0F211863047BB91FF32A55AE5680E'
                   slotName: 'staging-qa'
                  #  package: '$(Pipeline.Workspace)/drop/**/*.zip'
                   package: '$(Pipeline.Workspace)/drop/webapp/*.zip'

              
